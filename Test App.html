<title>Test App</title>

<style>
body{
font-family:Arial, Helvetica, sans-serif;
background:#f5f7fb;
margin:0;
padding:0;
text-align:center;
}

h1{
margin-top:30px;
color:#1f2d3d;
}

#menu{
display:grid;
grid-template-columns:repeat(2,200px);
justify-content:center;
gap:15px;
margin-top:40px;
}

#menu button{
padding:14px;
border:none;
border-radius:8px;
background:#2f80ed;
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

#menu button:hover{
background:#1c60b3;
}

#quiz{
display:none;
max-width:700px;
margin:auto;
margin-top:40px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

#questionText{
font-size:18px;
margin-bottom:20px;
}

#answers{
text-align:left;
margin:auto;
max-width:500px;
}

#answers label{
display:block;
padding:8px;
margin-bottom:6px;
border-radius:6px;
cursor:pointer;
}

#answers label:hover{
background:#f0f4ff;
}

#controls{
margin-top:25px;
display:flex;
justify-content:center;
gap:10px;
}

#controls button{
padding:12px 18px;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
transition:0.2s;
}

#controls button:nth-child(1){
background:#6c757d;
color:white;
}

#controls button:nth-child(2){
background:#27ae60;
color:white;
}

#controls button:nth-child(3){
background:#e74c3c;
color:white;
}

#controls button:hover{
opacity:0.85;
}

#progressContainer{
width:100%;
height:16px;
background:#e4e7ec;
border-radius:10px;
overflow:hidden;
margin-bottom:20px;
}

#progressBar{
height:100%;
width:0%;
background:#2f80ed;
transition:0.3s;
}
#questionGrid{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:6px;
max-width:500px;
margin:0 auto 20px auto;
}

.questionBox{
padding:8px;
border-radius:6px;
background:#e4e7ec;
cursor:pointer;
font-size:14px;
}

.questionBox:hover{
background:#d0d7e2;
}

.questionCurrent{
background:#2f80ed;
color:white;
}

.questionAnswered{
background:#27ae60;
color:white;
}
#timer{
font-size:22px;
font-weight:bold;
color:#e74c3c;
margin-bottom:15px;
}
</style>

</head>

<body>

let currentQuestions = []
let currentIndex = 0

let selectedAnswer = null

const menu = document.getElementById("menu")

// CREATE TEST BUTTONS

// START TEST

function startTest(testName){

currentQuestions = tests[testName]
startQuiz()

}


// FINAL EXAM

function startFinalExam(){

let all = []

for(let key in tests){
all = all.concat(tests[key])
}

shuffle(all)

currentQuestions = all.slice(0,40)

startQuiz()

}


// START QUIZ

function startQuiz(){

document.getElementById("progressBar").style.width = "0%"
document.getElementById("menu").style.display="none"
document.getElementById("quiz").style.display="block"
createQuestionGrid()
timeLeft = 2400
startTimer()

currentIndex = 0
correctAnswers = 0

showQuestion()

}


// SHOW QUESTION

function showQuestion(){
let progress = ((currentIndex) / currentQuestions.length) * 100
document.getElementById("progressBar").style.width = progress + "%"

let q = currentQuestions[currentIndex]

document.getElementById("questionNumber").innerText =
"Question " + (currentIndex+1) + " / " + currentQuestions.length

document.getElementById("questionText").innerText = q.question

let answersDiv = document.getElementById("answers")
answersDiv.innerHTML = ""

q.answers.forEach((a,i)=>{

let label = document.createElement("label")

let checkbox = document.createElement("input")
checkbox.type = "checkbox"
checkbox.value = i

label.appendChild(checkbox)
label.appendChild(document.createTextNode(" " + a))

answersDiv.appendChild(label)
answersDiv.appendChild(document.createElement("br"))
document.querySelector("#controls button").disabled = currentIndex === 0
updateQuestionGrid()

})

}


// NEXT QUESTION

function nextQuestion(){

let q = currentQuestions[currentIndex]

let selected = []

document.querySelectorAll("#answers input:checked").forEach(el=>{
selected.push(parseInt(el.value))
})

userAnswers[currentIndex] = selected

selected.sort()
let correct = [...q.correct].sort()

if(JSON.stringify(selected) === JSON.stringify(correct)){
correctAnswers++
}

currentIndex++

if(currentIndex >= currentQuestions.length){
showResult()
}else{
showQuestion()
}

}
function previousQuestion(){

if(currentIndex > 0){
currentIndex--
showQuestion()
}

}
function goToMenu(){

document.getElementById("quiz").style.display = "none"
document.getElementById("result").style.display = "none"
document.getElementById("menu").style.display = "block"

}


// RESULT

function showResult(){

document.getElementById("quiz").style.display="none"

let score = (correctAnswers/currentQuestions.length)*100
let pass = correctAnswers >= currentQuestions.length*0.8

let resultDiv = document.getElementById("result")

let html = `
<h2>RESULT</h2>
Correct answers: ${correctAnswers} / ${currentQuestions.length}<br>
Score: ${score.toFixed(1)}%<br>
Status: ${pass ? "PASS ✅" : "FAIL ❌"}<br><br>
<h3>Review Answers</h3>
`

currentQuestions.forEach((q,i)=>{

let correctText = q.correct.map(i=>q.answers[i]).join(", ")
let userText = (userAnswers[i] || []).map(i=>q.answers[i]).join(", ")

html += `
<div style="margin-bottom:20px;">
<b>${i+1}. ${q.question}</b><br>
Your answer: ${userText || "None"}<br>
Correct answer: ${correctText}
</div>
`

})

resultDiv.style.display="block"
resultDiv.innerHTML = html

}
function createQuestionGrid(){

let grid = document.getElementById("questionGrid")
grid.innerHTML = ""

currentQuestions.forEach((q,i)=>{

let box = document.createElement("div")

box.className = "questionBox"

box.innerText = i+1

box.onclick = () => {
currentIndex = i
showQuestion()
}

grid.appendChild(box)

})

}
function updateQuestionGrid(){

let boxes = document.querySelectorAll(".questionBox")

boxes.forEach((box,i)=>{

box.classList.remove("questionCurrent")
box.classList.remove("questionAnswered")

if(i === currentIndex){
box.classList.add("questionCurrent")
}

if(userAnswers[i] && userAnswers[i].length > 0){
box.classList.add("questionAnswered")
}

})

}

// SHUFFLE FUNCTION

function shuffle(array){

for(let i=array.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))
[array[i],array[j]]=[array[j],array[i]]

}

}
function startTimer(){

timer = setInterval(function(){

timeLeft--

let minutes = Math.floor(timeLeft/60)
let seconds = timeLeft % 60

document.getElementById("timer").innerText =
minutes + ":" + (seconds < 10 ? "0"+seconds : seconds)

if(timeLeft <= 0){
clearInterval(timer)
showResult()
}

},1000)

}
function startFinalExam(){

let allQuestions = []

Object.values(tests).forEach(test=>{
allQuestions = allQuestions.concat(test)
})

allQuestions.sort(()=>Math.random()-0.5)

currentQuestions = allQuestions.slice(0,40)

startQuiz()

}
function reviewWrong(){

let wrong = []

currentQuestions.forEach((q,i)=>{

let user = userAnswers[i] || []
let correct = q.correct

if(JSON.stringify(user.sort()) !== JSON.stringify(correct.sort())){
wrong.push(q)
}

})

currentQuestions = wrong
currentIndex = 0
correctAnswers = 0

showQuestion()

}

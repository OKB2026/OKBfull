if(answered) return;

const q=pool[index];

const checked=[...document.querySelectorAll("input:checked")]
.map(e=>parseInt(e.value))
.sort();

const correct=[...q.answer].sort();

const result=document.getElementById("result");

const options=document.querySelectorAll(".option");

if(JSON.stringify(checked)===JSON.stringify(correct)){

score++;

result.innerText="Correct";
result.style.color="green";

}else{

wrongQuestions.push(q);

result.innerText="Incorrect – correct answer shown";
result.style.color="red";

options.forEach((opt,i)=>{

if(correct.includes(i)){
opt.style.background="#22c55e"; // green correct
}

if(checked.includes(i) && !correct.includes(i)){
opt.style.background="#ef4444"; // red wrong
}

});

}

answered=true;

updateHeader();

}


// ======================
// NAVIGATION
// ======================

function nextQuestion(){

index++;

render();

}

// ======================
// HEADER
// ======================

function updateHeader(){

document.getElementById("progress").innerText=(index+1)+" / "+pool.length;

document.getElementById("score").innerText="Score "+score;

}

// ======================
// FINISH
// ======================

function finish(){

stopTimer();

const percent=Math.round(score/pool.length*100);

document.getElementById("app").innerHTML=
"<h2>Exam finished</h2>"+
"<h3>"+score+" / "+pool.length+"</h3>"+
"<h3>"+percent+"%</h3>"+
"<button onclick='location.reload()'>Restart</button>";

}

// ======================
// TIMER
// ======================

function startTimer(){

stopTimer();

time=0;

timer=setInterval(()=>{

time++;

const m=Math.floor(time/60);

const s=time%60;

document.getElementById("timer").innerText=m+":"+String(s).padStart(2,"0");

},1000);

}

function stopTimer(){

clearInterval(timer);

document.getElementById("timer").innerText="";

}
if('serviceWorker' in navigator){

const code=`
self.addEventListener('install',e=>self.skipWaiting());
self.addEventListener('fetch',()=>{});
`;

const blob=new Blob([code],{type:'text/javascript'});

navigator.serviceWorker.register(URL.createObjectURL(blob));

}
</script>
<script>
    if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js");
    });
    }
</script>

</body>
</html>

// ======================
// VARIABLES
// ======================

let pool=[];
let index=0;
let score=0;
let answered=false;
let wrongQuestions=[];
let timer;
let time=0;

// ======================
// MODES
// ======================

function startStudy(){

stopTimer();

pool=[...questions].sort(()=>Math.random()-0.5);

index=0;
score=0;

render();

}
function prevQuestion(){

if(index>0){

index--;

render();

}

}


function startExam(){

pool=[...questions].sort(()=>Math.random()-0.5).slice(0,40);

index=0;
score=0;

startTimer();

render();

}
function startPractice(){

pool=[...wrongQuestions];

index=0;
score=0;

render();

}

// ======================
// RENDER
// ======================

function render(){

answered=false;

const q=pool[index];

if(!q){

finish();

return;

}

document.getElementById("question").innerText=q.question;

const optionsDiv=document.getElementById("options");

optionsDiv.innerHTML="";

q.options.forEach((opt,i)=>{

const label=document.createElement("label");

label.className="option";

const box=document.createElement("input");

box.type="checkbox";

box.value=i;

label.appendChild(box);

label.appendChild(document.createTextNode(" "+opt));

optionsDiv.appendChild(label);

});

updateHeader();

}

// ======================
// ANSWER
// ======================
function submitAnswer(){

if(answered) return;

const q=pool[index];

const checked=[...document.querySelectorAll("input:checked")]
.map(e=>parseInt(e.value))
.sort();

const correct=[...q.answer].sort();

const result=document.getElementById("result");

if(JSON.stringify(checked)===JSON.stringify(correct)){

score++;
result.innerText="Correct";
result.style.color="green";

}else{

wrongQuestions.push(q);

result.innerText="Incorrect";
result.style.color="red";

}

answered=true;

updateHeader();

}


// ======================
// NAVIGATION
// ======================

function nextQuestion(){

index++;

render();

}

// ======================
// HEADER
// ======================

function updateHeader(){

document.getElementById("progress").innerText=(index+1)+" / "+pool.length;

document.getElementById("score").innerText="Score "+score;

}

// ======================
// FINISH
// ======================

function finish(){

stopTimer();

const percent=Math.round(score/pool.length*100);

document.getElementById("app").innerHTML=
"<h2>Exam finished</h2>"+
"<h3>"+score+" / "+pool.length+"</h3>"+
"<h3>"+percent+"%</h3>"+
"<button onclick='location.reload()'>Restart</button>";

}

// ======================
// TIMER
// ======================

function startTimer(){

stopTimer();

time=0;

timer=setInterval(()=>{

time++;

const m=Math.floor(time/60);

const s=time%60;

document.getElementById("timer").innerText=m+":"+String(s).padStart(2,"0");

},1000);

}

function stopTimer(){

clearInterval(timer);

document.getElementById("timer").innerText="";

}
if('serviceWorker' in navigator){

const code=`
self.addEventListener('install',e=>self.skipWaiting());
self.addEventListener('fetch',()=>{});
`;

const blob=new Blob([code],{type:'text/javascript'});

navigator.serviceWorker.register(URL.createObjectURL(blob));

}
